name: CI/CD Docker Hub

on:
  push:
    branches: [ "qa", "main", "principal" ] # Se activa con cualquier push a estas ramas

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Auth Service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest -f apps/auth-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest

      - name: Construir y Subir Users Service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/users-service:latest -f apps/users-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/users-service:latest